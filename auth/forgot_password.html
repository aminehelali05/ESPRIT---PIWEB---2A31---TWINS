<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Voices of Peace</title>
    <link rel="icon" href="../vue/assets/favicon.ico" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="h-screen flex items-center justify-center relative overflow-hidden">
    <canvas id="particleCanvas"></canvas>

    <div class="glass-card w-full max-w-md p-8 m-4 relative z-10 animate-fade-in ring-1 ring-white/10">
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 bg-gradient-to-tr from-cyan-400 to-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-cyan-500/30">
                <i data-lucide="key" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">Reset
                Password</h1>
            <p class="text-gray-400 mt-2">Enter your email to receive a password reset link</p>
        </div>

        <form id="forgotPasswordForm" class="space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-300 ml-1">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="email" id="email" required
                        class="auth-input w-full pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-cyan-500/50 placeholder-gray-500"
                        placeholder="you@example.com">
                </div>
            </div>

            <button type="submit" id="resetBtn" class="btn-primary w-full py-3.5 rounded-xl text-lg shadow-lg">
                Send Reset Link
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-400">
            Remember your password?
            <a href="login.html" class="text-cyan-400 font-semibold hover:text-cyan-300 hover:underline">Sign In</a>
        </div>
    </div>

    <script src="js/auth-utils.js"></script>
    <script>
        lucide.createIcons();

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const btn = document.getElementById('resetBtn');

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 mx-auto animate-spin"></i>';
            lucide.createIcons();

            try {
                const response = await fetch('../api/users/forgot_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (result.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: 'Email Sent!',
                        html: result.message + (result.data?.reset_link ?
                            `<br><br><small class="text-gray-400">Demo Link:</small><br><a href="${result.data.reset_link}" class="text-cyan-400 text-xs break-all">${result.data.reset_link}</a>` : ''),
                        background: '#18181b',
                        color: '#fff',
                        confirmButtonColor: '#22d3ee'
                    });

                    // Redirect to login after 3 seconds
                    setTimeout(() => window.location.href = 'login.html', 3000);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: error.message || 'Failed to send reset link. Please try again.',
                    background: '#18181b',
                    color: '#fff'
                });
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
