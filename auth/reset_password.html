<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Voices of Peace</title>
    <link rel="icon" href="../vue/assets/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="h-screen flex items-center justify-center relative overflow-hidden">
    <canvas id="particleCanvas"></canvas>

    <div class="glass-card w-full max-w-md p-8 m-4 relative z-10 animate-fade-in ring-1 ring-white/10">
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 bg-gradient-to-tr from-cyan-400 to-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-cyan-500/30">
                <i data-lucide="lock" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">Create
                New Password</h1>
            <p class="text-gray-400 mt-2">Enter your new password below</p>
        </div>

        <form id="resetPasswordForm" class="space-y-6">
            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-300 ml-1">New Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="password" id="password" required minlength="6"
                        class="auth-input w-full pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-cyan-500/50 placeholder-gray-500"
                        placeholder="Enter new password">
                </div>
                <div id="passwordStrength" class="hidden mt-2">
                    <div class="h-1 w-full bg-gray-700 rounded-full overflow-hidden">
                        <div id="strengthBar" class="h-full transition-all duration-300"></div>
                    </div>
                    <p id="strengthText" class="text-xs mt-1"></p>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-medium text-gray-300 ml-1">Confirm Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
                    <input type="password" id="confirmPassword" required minlength="6"
                        class="auth-input w-full pl-10 pr-4 py-3 rounded-xl focus:ring-2 focus:ring-cyan-500/50 placeholder-gray-500"
                        placeholder="Confirm new password">
                </div>
            </div>

            <button type="submit" id="resetBtn" class="btn-primary w-full py-3.5 rounded-xl text-lg shadow-lg">
                Reset Password
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-400">
            <a href="login.html" class="text-cyan-400 font-semibold hover:text-cyan-300 hover:underline">Back to
                Login</a>
        </div>
    </div>

    <script src="js/auth-utils.js"></script>
    <script>
        lucide.createIcons();

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            Swal.fire({
                icon: 'error',
                title: 'Invalid Link',
                text: 'This reset link is invalid. Please request a new one.',
                background: '#18181b',
                color: '#fff'
            }).then(() => window.location.href = 'forgot_password.html');
        }

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthDiv = document.getElementById('passwordStrength');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            if (password.length > 0) {
                strengthDiv.classList.remove('hidden');
                let strength = 0;
                if (password.length >= 6) strength++;
                if (password.length >= 10) strength++;
                if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
                if (/\d/.test(password)) strength++;
                if (/[^a-zA-Z\d]/.test(password)) strength++;

                const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-lime-500', 'bg-green-500'];
                const texts = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
                const textColors = ['text-red-400', 'text-orange-400', 'text-yellow-400', 'text-lime-400', 'text-green-400'];

                strengthBar.className = `h-full transition-all duration-300 ${colors[strength - 1]}`;
                strengthBar.style.width = `${(strength / 5) * 100}%`;
                strengthText.className = `text-xs mt-1 ${textColors[strength - 1]}`;
                strengthText.textContent = texts[strength - 1];
            } else {
                strengthDiv.classList.add('hidden');
            }
        });

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');

            // Validate passwords match
            if (password !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'Password Mismatch',
                    text: 'Passwords do not match. Please try again.',
                    background: '#18181b',
                    color: '#fff'
                });
                return;
            }

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 mx-auto animate-spin"></i>';
            lucide.createIcons();

            try {
                const response = await fetch('../api/users/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password, confirmPassword })
                });

                const result = await response.json();

                if (result.success) {
                    await Swal.fire({
                        icon: 'success',
                        title: 'Password Reset!',
                        text: 'Your password has been reset successfully. Redirecting to login...',
                        background: '#18181b',
                        color: '#fff',
                        confirmButtonColor: '#22d3ee',
                        timer: 2000
                    });

                    window.location.href = 'login.html';
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: error.message || 'Failed to reset password. The link may be expired.',
                    background: '#18181b',
                    color: '#fff'
                });
            } finally {
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>

</html>
